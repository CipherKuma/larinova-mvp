<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 512px;
        height: 512px;
        background: transparent;
      }
      svg {
        width: 512px;
        height: 512px;
      }
    </style>
  </head>
  <body>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 32 32"
      width="512"
      height="512"
    >
      <!-- Left circle - dark visible stroke -->
      <circle
        cx="12"
        cy="16"
        r="7"
        fill="none"
        stroke="#1E293B"
        stroke-width="1.4"
      />
      <!-- Right circle - dark visible stroke -->
      <circle
        cx="20"
        cy="16"
        r="7"
        fill="none"
        stroke="#1E293B"
        stroke-width="1.4"
      />
      <!-- Green lens (vesica piscis) -->
      <path d="M16.5 10.1a7 7 0 0 0-1 11.8 7 7 0 0 0 1-11.8Z" fill="#10b981" />
      <path d="M15.5 10.1a7 7 0 0 1 1 11.8 7 7 0 0 1-1-11.8Z" fill="#10b981" />
    </svg>
  </body>
</html>
