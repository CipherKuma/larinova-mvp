<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 400px;
        height: 100px;
        background: #0f172a;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
      }
      span {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 34px;
        font-weight: 700;
        color: #f9fafb;
        letter-spacing: -1px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 32 32"
      width="64"
      height="64"
    >
      <!-- Left circle -->
      <circle
        cx="12"
        cy="16"
        r="7"
        fill="none"
        stroke="#64748B"
        stroke-width="1.2"
      />
      <!-- Right circle -->
      <circle
        cx="20"
        cy="16"
        r="7"
        fill="none"
        stroke="#64748B"
        stroke-width="1.2"
      />
      <!-- Green lens (vesica piscis) -->
      <path d="M16.5 10.1a7 7 0 0 0-1 11.8 7 7 0 0 0 1-11.8Z" fill="#34d399" />
      <path d="M15.5 10.1a7 7 0 0 1 1 11.8 7 7 0 0 1-1-11.8Z" fill="#34d399" />
    </svg>
    <span>Larinova</span>
  </body>
</html>
